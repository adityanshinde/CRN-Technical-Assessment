version: '3.8'

services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: productapi-sqlserver
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: src/API/ProductApi.API/Dockerfile
    container_name: productapi-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:80"
      ConnectionStrings__DefaultConnection: "Server=sql-server;Database=ProductApiDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      JwtSettings__SecretKey: "YourSuperSecretKeyThatIsAtLeast32CharactersLong!"
      JwtSettings__Issuer: "ProductApi"
      JwtSettings__Audience: "ProductApiClients"
      JwtSettings__AccessTokenExpirationMinutes: "15"
    ports:
      - "5000:80"
    depends_on:
      sql-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver-data:
